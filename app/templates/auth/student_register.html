{% extends "layouts/public_base.html" %}

{% block title %}
Student Registration
{% endblock %}


{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <img
        src="{{ url_for('static', filename='images/favicon-96x96.png') }}"
        class="auth-logo">


        <h1>Create Student Account</h1>

        <p>
            Register to participate in SmartProctor examinations.
        </p>


        <form method="POST">


            <div class="form-group">

                <label>Full Name</label>

                <input
                type="text"
                name="full_name"
                placeholder="Enter your full name"
                value="{{ request.form.get('full_name','') }}"
                required>

            </div>



            <div class="form-group">

                <label>Email Address</label>

                <input
                type="email"
                name="email"
                placeholder="Enter your email"
                value="{{ request.form.get('email','') }}"
                required>

            </div>



            <div class="form-group">

                <label>Password</label>

                <input
                type="password"
                name="password"
                placeholder="Create password"
                required>

            </div>



            <div class="form-group">

                <label>Register Number</label>

                <input
                type="text"
                name="register_number"
                placeholder="Enter register number"
                value="{{ request.form.get('register_number','') }}"
                required>

            </div>



            <div class="form-group">

                <label>Department</label>

                <input
                type="text"
                name="department"
                placeholder="Enter department"
                value="{{ request.form.get('department','') }}"
                required>

            </div>



            <button
            type="submit"
            class="btn-primary full-width">

                Create Account

            </button>


        </form>



        <p class="auth-link">

            Already have an account?

            <a href="{{ url_for('auth.student_login') }}">
                Login
            </a>

        </p>


    </div>

</section>

{% endblock %}
