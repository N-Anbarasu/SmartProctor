{% extends "layouts/public_base.html" %}

{% block title %}
Teacher Registration
{% endblock %}


{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <img
        src="{{ url_for('static', filename='images/favicon-96x96.png') }}"
        class="auth-logo">


        <h1>Create Teacher Account</h1>


        <p>
            Register to manage examinations and monitor students.
        </p>



        <form method="POST">


            <div class="form-group">

                <label>Name</label>

                <input
                type="text"
                name="name"
                placeholder="Enter your name"
                required>

            </div>



            <div class="form-group">

                <label>Email Address</label>

                <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required>

            </div>



            <div class="form-group">

                <label>Password</label>

                <input
                type="password"
                name="password"
                placeholder="Create password"
                required>

            </div>



            <div class="form-group">

                <label>Department</label>

                <input
                type="text"
                name="department"
                placeholder="Enter department"
                required>

            </div>



            <div class="form-group">

                <label>Class ID</label>

                <input
                type="text"
                name="class_id"
                placeholder="Enter class ID"
                required>

            </div>



            <button
            type="submit"
            class="btn-primary full-width">

                Create Account

            </button>


        </form>



        <p class="auth-link">

            Already have an account?

            <a href="{{ url_for('auth.teacher_login') }}">
                Login
            </a>

        </p>


    </div>

</section>

{% endblock %}
