{% extends "layouts/base.html" %}

{% block title %}
Teacher Login
{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <img
        src="{{ url_for('static', filename='images/favicon-96x96.png') }}"
        class="auth-logo">

        <h1>Teacher Login</h1>

        <p>

            Sign in to manage examinations and monitor students.

        </p>

        <form>

            <div class="form-group">

                <label>Teacher Name</label>

                <input
                type="text"
                placeholder="Enter your name">

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <input
                type="email"
                placeholder="Enter your email">

            </div>

            <div class="form-group">

                <label>Class ID</label>

                <input
                type="text"
                placeholder="Enter class ID">

            </div>

            <button class="btn-primary full-width">

                Continue

            </button>

        </form>

    </div>

</section>

{% endblock %}
