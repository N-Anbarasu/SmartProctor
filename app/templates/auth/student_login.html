{% extends "layouts/public_base.html" %}

{% block title %}
Student Login
{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <img
        src="{{ url_for('static', filename='images/favicon-96x96.png') }}"
        class="auth-logo">

        <h1>Student Login</h1>

        <p>
            Sign in to attend examinations and access your SmartProctor dashboard.
        </p>


        <form method="POST">

            <div class="form-group">

                <label>Email Address</label>

                <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required>

            </div>


            <div class="form-group">

                <label>Password</label>

                <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required>

            </div>


            <button 
            type="submit"
            class="btn-primary full-width">

                Login

            </button>


        </form>


        <p class="auth-link">

            New student?

            <a href="{{ url_for('auth.student_register') }}">
                Create an account
            </a>

        </p>


    </div>

</section>

{% endblock %}
