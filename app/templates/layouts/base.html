<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            SmartProctor
        {% endblock %}
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    {% block styles %}
    {% endblock %}

</head>

<body>

    {% include 'layouts/navbar.html' %}

    {% include 'layouts/flash_messages.html' %}

    <main>

        {% block content %}
        {% endblock %}

    </main>

    {% include 'layouts/footer.html' %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block scripts %}
    {% endblock %}

</body>

</html>
